# ─────────────────────────────────────────────────────────────────────────────
# Bonde NSE Scanner — Historical Backtest
# GitHub Actions Workflow
#
# MANUAL TRIGGER ONLY — never scheduled.
# Full NSE universe backtest takes 45–120 min; run intentionally
# after config changes, not automatically every day.
#
# What it does:
#   1. Full price history download (3-year default, configurable)
#   2. Walk-forward backtest: MB_BREAKOUT + MB_ANTICIPATION + EP_9M
#   3. Runs TWICE — WITH and WITHOUT Market Monitor filter
#      (proves value of the FFM rule)
#   4. Exports 6-sheet Excel analysis report
#   5. Sends Telegram with headline metrics
#   6. Uploads Excel + trade log CSV + SQLite as 90-day artifacts
#
# Key MB rules enforced in simulation (from backtest.py):
#   • Force exit Day 3 at 50% position (MB_PARTIAL_EXIT_DAY)
#   • Force exit Day 5 at 100% (MB_HOLD_MAX_DAYS)
#   • Stop loss hit → exit immediately at stop price
#   • Stop: 5% large cap, 7% small cap (MB_STOP_PCT_LARGE / SMALL)
#   • EP: trail stop at 10% below recent high after 20%+ gain
#
# Secrets required:
#   TELEGRAM_BOT_TOKEN   — optional; skipped if not set
#   TELEGRAM_CHAT_ID     — optional
# ─────────────────────────────────────────────────────────────────────────────

name: Bonde Backtest

on:
  workflow_dispatch:
    inputs:
      signal_type:
        description: "Signal type to backtest"
        required: false
        default: "MB_BREAKOUT"
        type: choice
        options:
          - MB_BREAKOUT
          - EP_9M
          - both
      years:
        description: "How many years of history to backtest (1 / 2 / 3 / 5)"
        required: false
        default: "3"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "5"
      min_score:
        description: "Minimum composite score to accept a signal (0–100, default 40)"
        required: false
        default: "40"
      symbol_limit:
        description: "Max symbols (leave empty = ALL NSE; use 100 for a quick test)"
        required: false
        default: ""
      notes:
        description: "Notes for this run (e.g. 'Tightened MB_CONSOL_MAX_WIDTH to 10%')"
        required: false
        default: ""
      notify_telegram:
        description: "Send Telegram results? (yes / no)"
        required: false
        default: "yes"

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
  ACCOUNT_SIZE:       ${{ secrets.ACCOUNT_SIZE || '1000000' }}
  RISK_PCT:           ${{ secrets.RISK_PCT || '1.0' }}

concurrency:
  group: bonde-scanner
  cancel-in-progress: false

jobs:
  backtest:
    name: Bonde Backtest — ${{ github.event.inputs.signal_type }} | ${{ github.event.inputs.years }}yr
    runs-on: ubuntu-latest
    timeout-minutes: 180    # full NSE 3yr backtest ~60-120 min; 180 is safe

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Date metadata ─────────────────────────────────────────────────────
      - name: Get date metadata
        id: date
        run: |
          echo "today=$(date +'%Y-%m-%d')"                          >> $GITHUB_OUTPUT
          echo "ts=$(date +'%Y%m%d_%H%M')"                          >> $GITHUB_OUTPUT
          echo "ist=$(TZ=Asia/Kolkata date +'%Y-%m-%d %H:%M IST')" >> $GITHUB_OUTPUT

      # ── 4. Full price history download ───────────────────────────────────────
      # Always full-refresh for backtests — need the complete history,
      # not just incremental bars from the last scan run.
      - name: Download full NSE price history
        run: |
          echo "Downloading full price history for backtest …"
          python main.py --full-refresh
          echo "Download complete."

      # ── 5. Run backtest ───────────────────────────────────────────────────────
      # Calls backtest.run_backtest() twice (with + without MM filter)
      # via a thin shim that also exports the Excel and CSV.
      - name: Run backtest
        id: run_backtest
        run: |
          python - << 'PYEOF'
          import sys, json, sqlite3
          from datetime import date, timedelta
          from pathlib import Path

          # ── Parse inputs ────────────────────────────────────────────────────
          import os
          signal_type  = os.environ.get("SIGNAL_TYPE",  "MB_BREAKOUT")
          years        = int(os.environ.get("YEARS",    "3"))
          min_score    = float(os.environ.get("MIN_SCORE", "40"))
          sym_limit    = os.environ.get("SYM_LIMIT", "").strip()
          notes        = os.environ.get("NOTES", "")

          today      = date.today()
          start_date = today - timedelta(days=365 * years)

          print(f"Backtest config:")
          print(f"  Signal type : {signal_type}")
          print(f"  Period      : {start_date} → {today}")
          print(f"  Min score   : {min_score}")
          print(f"  Sym limit   : {sym_limit or 'ALL'}")
          print(f"  Notes       : {notes or '—'}")

          # ── Load universe ────────────────────────────────────────────────────
          from universe import fetch_nse_symbols
          symbols = fetch_nse_symbols(force_refresh=False)
          if sym_limit:
              symbols = symbols[: int(sym_limit)]
          print(f"Universe: {len(symbols)} symbols")

          # ── Run backtest WITH Market Monitor filter ──────────────────────────
          print("\n[1/2] Running WITH Market Monitor filter (FFM rule ON) …")
          from backtest import run_backtest
          results_with = run_backtest(
              symbols         = symbols,
              start_date      = start_date,
              end_date        = today,
              apply_mm_filter = True,
              signal_type     = signal_type,
              min_score       = min_score,
          )

          # ── Run backtest WITHOUT Market Monitor filter ───────────────────────
          print("\n[2/2] Running WITHOUT Market Monitor filter (FFM rule OFF) …")
          results_without = run_backtest(
              symbols         = symbols,
              start_date      = start_date,
              end_date        = today,
              apply_mm_filter = False,
              signal_type     = signal_type,
              min_score       = min_score,
          )

          # ── Save results to JSON (for downstream steps; strip internal keys) ──
          Path("reports").mkdir(exist_ok=True)

          def _strip_internal(r: dict) -> dict:
              """Remove pandas/internal objects not JSON-serialisable."""
              return {k: v for k, v in r.items() if not k.startswith("_")}

          payload = {
              "signal_type":  signal_type,
              "years":        years,
              "min_score":    min_score,
              "start_date":   str(start_date),
              "end_date":     str(today),
              "notes":        notes,
              "with_filter":    _strip_internal(results_with),
              "without_filter": _strip_internal(results_without),
          }
          with open("reports/backtest_results.json", "w") as f:
              json.dump(payload, f, indent=2, default=str)

          # ── Export to Excel — reference-quality multi-sheet report ──────────
          # Uses backtest.export_backtest_excel(): Verdict, Equity Curve,
          # Regime/RS/TI65/Score/Width/2LYNCH Analysis, Yearly P&L,
          # Exit Analysis, full Trade Log — 11 sheets total.
          from backtest import export_backtest_excel

          excel_path = f"reports/bonde_backtest_{today}.xlsx"
          if "error" not in results_with:
              export_backtest_excel(
                  results_with    = results_with,
                  results_without = results_without,
                  output_path     = excel_path,
                  signal_type     = signal_type,
                  years           = years,
                  notes           = notes,
              )
              print(f"\nExcel written → {excel_path}")
          else:
              print(f"\n⚠️  Skipping Excel export: {results_with.get('error')}")

          print("\n=== RESULTS SUMMARY ===")
          for label, r in [("WITH MM Filter", results_with), ("WITHOUT MM Filter", results_without)]:
              tc = r.get("trade_count", 0)
              wr = r.get("win_rate_pct", 0)
              pf = r.get("profit_factor", 0)
              cg = r.get("cagr_pct", 0)
              dd = r.get("max_drawdown_pct", 0)
              sh = r.get("sharpe_ratio", 0)
              er = r.get("expectancy_r", 0)
              print(f"\n{label}:")
              print(f"  Trades={tc} | Win%={wr} | PF={pf} | E[R]={er} | CAGR={cg}% | MaxDD={dd}% | Sharpe={sh}")
          PYEOF
        env:
          SIGNAL_TYPE: ${{ github.event.inputs.signal_type }}
          YEARS:       ${{ github.event.inputs.years }}
          MIN_SCORE:   ${{ github.event.inputs.min_score }}
          SYM_LIMIT:   ${{ github.event.inputs.symbol_limit }}
          NOTES:       ${{ github.event.inputs.notes }}

      # ── 6. Send Telegram results ──────────────────────────────────────────────
      - name: Send Telegram backtest summary
        if: >
          github.event.inputs.notify_telegram != 'no' &&
          env.TELEGRAM_BOT_TOKEN != '' &&
          env.TELEGRAM_CHAT_ID != ''
        run: |
          python - << 'PYEOF'
          import os, json, urllib.request
          from pathlib import Path

          token   = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]

          results_file = Path("reports/backtest_results.json")
          if not results_file.exists():
              print("No results JSON — skipping Telegram")
              exit(0)

          with open(results_file) as f:
              payload = json.load(f)

          rw  = payload.get("with_filter", {})
          rwo = payload.get("without_filter", {})

          def fmt(r):
              return (
                  f"  Trades: {r.get('trade_count','?')} | "
                  f"Win: {r.get('win_rate_pct','?')}% | "
                  f"PF: {r.get('profit_factor','?')} | "
                  f"CAGR: {r.get('cagr_pct','?')}% | "
                  f"MaxDD: {r.get('max_drawdown_pct','?')}%"
              )

          # Build regime breakdown text
          regime_lines = []
          for k, v in rwo.get("regime_breakdown", {}).items():
              regime_lines.append(
                  f"  {k}: {v['count']} trades | Win {v['win_rate']}% | PF {v.get('profit_factor','?')}"
              )

          msg = (
              f"📊 *Bonde Backtest Complete*\n"
              f"Signal: `{payload.get('signal_type','?')}` | "
              f"Period: {payload.get('start_date','?')} → {payload.get('end_date','?')}\n\n"
              f"*WITH Market Monitor (FFM ON):*\n{fmt(rw)}\n\n"
              f"*WITHOUT Market Monitor (FFM OFF):*\n{fmt(rwo)}\n\n"
              f"*Regime Breakdown (FFM OFF — shows value of filter):*\n"
              + "\n".join(regime_lines or ["  No data"]) +
              f"\n\nNotes: {payload.get('notes','-')}\n"
              f"Full Excel in GitHub Actions artifacts."
          )

          data = json.dumps({
              "chat_id":    chat_id,
              "text":       msg,
              "parse_mode": "Markdown",
          }).encode()
          req = urllib.request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=data,
              headers={"Content-Type": "application/json"},
          )
          with urllib.request.urlopen(req) as resp:
              print("Telegram OK:", resp.status)
          PYEOF
        continue-on-error: true

      # ── 7. Upload Excel backtest report ───────────────────────────────────────
      - name: Upload Excel report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bonde-backtest-report-${{ steps.date.outputs.ts }}
          path: reports/bonde_backtest_*.xlsx
          retention-days: 90
          if-no-files-found: warn

      # ── 8. Upload raw results JSON ────────────────────────────────────────────
      - name: Upload results JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bonde-backtest-json-${{ steps.date.outputs.ts }}
          path: reports/backtest_results.json
          retention-days: 90
          if-no-files-found: warn

      # ── 9. Upload logs ────────────────────────────────────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bonde-backtest-logs-${{ steps.date.outputs.ts }}
          path: logs/
          retention-days: 30
          if-no-files-found: warn

      # ── 10. Job summary ───────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          python - << 'PYEOF'
          import json, os
          from pathlib import Path

          out  = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          ist  = os.environ.get("IST_TIME", "")
          f    = Path("reports/backtest_results.json")

          lines = [f"## Bonde Backtest Results — {ist}", ""]

          if f.exists():
              payload = json.load(open(f))
              rw  = payload.get("with_filter", {})
              rwo = payload.get("without_filter", {})

              lines += [
                  f"**Signal type:** `{payload.get('signal_type','?')}` | "
                  f"**Period:** {payload.get('start_date','?')} → {payload.get('end_date','?')}  ",
                  f"**Notes:** {payload.get('notes','-')}",
                  "",
                  "### Core Metrics",
                  "",
                  "| Metric | WITH MM Filter | WITHOUT MM Filter |",
                  "|--------|---------------|------------------|",
              ]
              metrics = [
                  ("trade_count",        "Trades"),
                  ("win_rate_pct",       "Win Rate %"),
                  ("profit_factor",      "Profit Factor"),
                  ("avg_win_pct",        "Avg Win %"),
                  ("avg_loss_pct",       "Avg Loss %"),
                  ("cagr_pct",           "CAGR %"),
                  ("max_drawdown_pct",   "Max Drawdown %"),
                  ("sharpe_ratio",       "Sharpe Ratio"),
                  ("avg_hold_days_mb",   "Avg Hold Days (MB)"),
                  ("day3_target_hit_pct","Day 3 Exit Hit %"),
                  ("burst_8pct_pct",     "MB Burst ≥8% within 5d %"),
                  ("monthly_avg_signals","Avg Signals / Month"),
              ]
              for key, label in metrics:
                  w  = rw.get(key,  "—")
                  wo = rwo.get(key, "—")
                  lines.append(f"| {label} | **{w}** | {wo} |")

              lines += [
                  "",
                  "### Market Regime Breakdown (WITHOUT MM filter — shows WHY the filter works)",
                  "",
                  "| Regime | Trades | Win% | Avg P&L | Profit Factor |",
                  "|--------|--------|------|---------|---------------|",
              ]
              for k, v in rwo.get("regime_breakdown", {}).items():
                  lines.append(
                      f"| {k} | {v['count']} | {v['win_rate']}% | "
                      f"{v['avg_pnl']}% | {v.get('profit_factor','—')} |"
                  )

              lines += [
                  "",
                  "### 2LYNCH Score Breakdown (WITH MM filter)",
                  "",
                  "| Score | Trades | Win% | Avg P&L |",
                  "|-------|--------|------|---------|",
              ]
              for k, v in rw.get("twolynch_breakdown", {}).items():
                  lines.append(f"| {k} | {v['count']} | {v['win_rate']}% | {v['avg_pnl']}% |")

              lines += [
                  "",
                  "### Exit Reason Breakdown (WITH MM filter)",
                  "",
                  "| Exit Reason | Trades | Win% | Avg P&L |",
                  "|-------------|--------|------|---------|",
              ]
              for k, v in rw.get("exit_breakdown", {}).items():
                  lines.append(f"| {k} | {v['count']} | {v['win_rate']}% | {v['avg_pnl']}% |")

              lines += [
                  "",
                  "---",
                  "Download **bonde-backtest-report** artifact for the full 7-sheet Excel analysis.",
              ]
          else:
              lines.append("⚠️ No results JSON found — backtest may have failed. Check logs.")

          with open(out, "a") as fp:
              fp.write("\n".join(lines) + "\n")
          PYEOF
        env:
          IST_TIME: ${{ steps.date.outputs.ist }}
