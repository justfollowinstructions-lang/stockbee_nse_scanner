# ─────────────────────────────────────────────────────────────────────────────
# Bonde NSE Scanner — Daily EOD Production Workflow
# ─────────────────────────────────────────────────────────────────────────────

name: Bonde Daily Scan

on:
  schedule:
    # 10:15 UTC = 3:45 PM IST
    - cron: "15 10 * * 1-5"

  workflow_dispatch:
    inputs:
      full_refresh:
        description: "Re-download complete history"
        required: false
        default: "no"

      refresh_universe:
        description: "Refresh NSE symbol universe"
        required: false
        default: "no"

      notify_telegram:
        description: "Send Telegram notification"
        required: false
        default: "yes"

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  ACCOUNT_SIZE: ${{ secrets.ACCOUNT_SIZE || '1000000' }}
  RISK_PCT: ${{ secrets.RISK_PCT || '1.0' }}

concurrency:
  group: bonde-scanner
  cancel-in-progress: false

jobs:

  daily-scan:

    runs-on: ubuntu-latest

    timeout-minutes: 60

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: pip
        cache-dependency-path: requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Date metadata
      id: meta
      run: |
        echo "today=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
        echo "week=$(date +'%Y-W%V')" >> $GITHUB_OUTPUT
        echo "ist=$(TZ=Asia/Kolkata date +'%Y-%m-%d %H:%M IST')" >> $GITHUB_OUTPUT

    - name: Restore cache
      id: cache
      uses: actions/cache@v4
      with:
        path: |
          data/
          scanner.db
          logs/
        key: bonde-cache-${{ runner.os }}-${{ steps.meta.outputs.week }}
        restore-keys: |
          bonde-cache-${{ runner.os }}-

    ##########################################################################
    # ONLY ONE EXECUTION OF main.py
    ##########################################################################

    - name: Run Bonde Scanner
      run: |

        EXTRA_ARGS=""

        if [ "${{ github.event.inputs.full_refresh }}" = "yes" ]; then
          EXTRA_ARGS="$EXTRA_ARGS --full-refresh"
        fi

        if [ "${{ github.event.inputs.refresh_universe }}" = "yes" ]; then
          EXTRA_ARGS="$EXTRA_ARGS --refresh-universe"
        fi

        if [ "${{ github.event.inputs.notify_telegram }}" = "no" ]; then
          EXTRA_ARGS="$EXTRA_ARGS --no-telegram"
        fi

        echo "Running: python main.py $EXTRA_ARGS"

        python main.py $EXTRA_ARGS

    ##########################################################################
    # Upload database
    ##########################################################################

    - name: Upload SQLite database
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bonde-signals-db-${{ steps.meta.outputs.today }}
        path: |
          scanner.db
          data/signals.db
        retention-days: 30
        if-no-files-found: warn

    ##########################################################################
    # Upload reports
    ##########################################################################

    - name: Upload Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bonde-report-${{ steps.meta.outputs.today }}
        path: |
          reports/**/*.xlsx
          *.xlsx
        retention-days: 30
        if-no-files-found: warn

    ##########################################################################
    # Upload logs
    ##########################################################################

    - name: Upload Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bonde-logs-${{ steps.meta.outputs.today }}
        path: logs/**
        retention-days: 14
        if-no-files-found: warn

    ##########################################################################
    # Summary
    ##########################################################################

    - name: Workflow Summary
      if: always()
      env:
        IST_TIME: ${{ steps.meta.outputs.ist }}
      run: |
        python <<'PY'

        import sqlite3
        import os
        from pathlib import Path

        summary=os.environ["GITHUB_STEP_SUMMARY"]

        db_candidates=[
            Path("data/signals.db"),
            Path("scanner.db")
        ]

        db=None
        for p in db_candidates:
            if p.exists():
                db=p
                break

        text=[]

        text.append(f"# Bonde Daily Scan")
        text.append("")
        text.append(f"**Completed:** {os.environ['IST_TIME']}")
        text.append("")

        if db:

            try:

                con=sqlite3.connect(db)

                total=con.execute(
                    "SELECT COUNT(*) FROM signals WHERE scan_date=date('now')"
                ).fetchone()[0]

                mb=con.execute(
                    "SELECT COUNT(*) FROM signals WHERE scan_date=date('now') AND signal_type LIKE 'MB%'"
                ).fetchone()[0]

                ep=con.execute(
                    "SELECT COUNT(*) FROM signals WHERE scan_date=date('now') AND signal_type LIKE 'EP%'"
                ).fetchone()[0]

                con.close()

                text.extend([
                    "|Metric|Value|",
                    "|---|---:|",
                    f"|Total Signals|{total}|",
                    f"|Momentum Burst|{mb}|",
                    f"|Episodic Pivot|{ep}|"
                ])

            except Exception as e:
                text.append(f"Database error: {e}")

        else:
            text.append("No database produced.")

        with open(summary,"a") as f:
            f.write("\n".join(text))

        PY
